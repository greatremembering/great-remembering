backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "homepage"
    label: "Homepage"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.html"
        fields:
          - label: "Page HTML"
            name: "body"
            widget: "text"